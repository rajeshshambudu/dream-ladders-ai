<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dream Ladders AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
}

.app{
max-width:750px;
margin:auto;
padding:20px;
}

header{
text-align:center;
margin-bottom:20px;
}

header h1{
font-size:34px;
margin-bottom:8px;
}

header p{
opacity:.8;
font-size:15px;
}

#chatbox{
background:white;
color:#111;
height:520px;
overflow-y:auto;
border-radius:18px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.bot,.user{
padding:12px;
margin:10px 0;
border-radius:12px;
white-space:pre-line;
line-height:1.5;
}

.bot{
background:#e0f2fe;
}

.user{
background:#dcfce7;
text-align:right;
}

.input-area{
display:flex;
gap:10px;
margin-top:15px;
}

input{
flex:1;
padding:14px;
font-size:16px;
border:none;
border-radius:12px;
outline:none;
}

button{
padding:14px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

.send-btn{
background:#22c55e;
color:white;
}

.lang-box{
display:flex;
gap:10px;
justify-content:center;
margin-top:15px;
}

.lang-box button{
background:white;
color:#111;
}

.reset-btn{
background:#ef4444;
color:white;
margin-top:15px;
width:100%;
}

a{
color:#0284c7;
font-weight:bold;
text-decoration:none;
}

small{
display:block;
margin-top:8px;
opacity:.7;
}
</style>
</head>

<body>

<div class="app">

<header>
<h1>Dream Ladders AI</h1>
<p>Your Civil Engineer Powered by Smart Logic</p>
</header>

<div id="chatbox"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Type here">
<button class="send-btn" id="sendBtn">Send</button>
</div>

<div class="lang-box">
<button id="btnEn">English</button>
<button id="btnTe">తెలుగు</button>
</div>

<button class="reset-btn" id="resetBtn">Restart Chat</button>

</div>

<script>

let lang="en";
let step=0;
let data={};
let phone="917093218658";

const chatbox=document.getElementById("chatbox");
const input=document.getElementById("userInput");

const q={
en:[
"Welcome to Dream Ladders AI House Cost Estimator 👷\nGet an instant estimate for your dream home construction.\n\nWhich city are you building in?",
"What is built-up area in sq ft?\nExample: 1000",
"How many floors?\nExample: 1 / 2 / 3",
"Material type?\nstandard / premium",
"Need interior also?\nyes / no"
],

te:[
"Dream Ladders AI House Cost Estimator కు స్వాగతం 👷\nమీ ఇంటి నిర్మాణ ఖర్చును వెంటనే తెలుసుకోండి.\n\nమీరు ఏ నగరంలో నిర్మిస్తున్నారు?",
"ఇంటి built-up area ఎంత sq ft?\nఉదాహరణ: 1000",
"ఎన్ని అంతస్తులు?\nఉదాహరణ: 1 / 2 / 3",
"మెటీరియల్ టైప్?\nstandard / premium",
"ఇంటీరియర్ కూడా కావాలా?\nyes / no"
]
};

function add(text,type){
let div=document.createElement("div");
div.className=type;
div.innerText=text;
chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;
}

function addHtml(html){
let div=document.createElement("div");
div.className="bot";
div.innerHTML=html;
chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;
}

function ask(){
add(q[lang][step],"bot");
}

function resetChat(){
step=0;
data={};
chatbox.innerHTML="";
input.value="";
ask();
}

function setLang(l){
lang=l;
resetChat();
}

function isNumber(v){
return !isNaN(v) && v.trim()!=="";
}

function nextStep(){

let val=input.value.trim();

if(!val) return;

add(val,"user");

if(step===0){

if(isNumber(val)){
add(lang==="en"
?`You entered "${val}". I am asking city name.\nExample: Hyderabad / Nizamabad`
:`మీరు "${val}" ఇచ్చారు. నేను నగరం పేరు అడిగాను.\nఉదాహరణ: Hyderabad / Nizamabad`
,"bot");
input.value="";
return;
}

data.city=val;
}

else if(step===1){

if(!isNumber(val) || Number(val)<=0){
add(lang==="en"
?`You entered "${val}". I am asking built-up area in sq ft.\nExample: 1000`
:`మీరు "${val}" ఇచ్చారు. నేను sq ft area అడిగాను.\nఉదాహరణ: 1000`
,"bot");
input.value="";
return;
}

data.area=parseFloat(val);
}

else if(step===2){

if(!isNumber(val) || Number(val)<=0){
add(lang==="en"
?`You entered "${val}". I am asking number of floors.\nExample: 1 / 2 / 3`
:`మీరు "${val}" ఇచ్చారు. నేను floors అడిగాను.\nఉదాహరణ: 1 / 2 / 3`
,"bot");
input.value="";
return;
}

data.floors=parseInt(val);
}

else if(step===3){

val=val.toLowerCase();

if(val!=="standard" && val!=="premium"){
add(lang==="en"
?`You entered "${val}". Please type:\nstandard OR premium`
:`మీరు "${val}" ఇచ్చారు.\nstandard లేదా premium టైప్ చేయండి`
,"bot");
input.value="";
return;
}

data.material=val;
}

else if(step===4){

val=val.toLowerCase();

if(val!=="yes" && val!=="no"){
add(lang==="en"
?`You entered "${val}". Please type:\nyes OR no`
:`మీరు "${val}" ఇచ్చారు.\nyes లేదా no టైప్ చేయండి`
,"bot");
input.value="";
return;
}

data.interior=val;
}

input.value="";
step++;

if(step<q[lang].length){
ask();
}else{
result();
}

}

function result(){

let rate=1900;

if(data.city.toLowerCase().includes("hyderabad")) rate=2200;
if(data.city.toLowerCase().includes("nizamabad")) rate=1850;

if(data.material==="premium") rate+=400;

let totalArea=data.area*data.floors;
let total=totalArea*rate;

if(data.interior==="yes"){
total+=totalArea*450;
}

let cement=Math.round(totalArea*0.45);
let steel=Math.round(totalArea*4.2);
let sand=(totalArea*0.018).toFixed(1);
let agg=(totalArea*0.025).toFixed(1);

if(lang==="en"){

add(
`🏠 Total Built-up Area: ${totalArea} sq ft

💰 Estimated Cost: ₹${total.toLocaleString("en-IN")}

🧱 Cement Bags: ${cement}

🔩 Steel: ${steel} kg

🏖 Sand: ${sand} m³

🪨 Aggregate: ${agg} m³

⚠ Preliminary estimate only.
Final cost depends on design, soil, market rates & drawings.

📞 Click below for detailed quote`,
"bot");

}else{

add(
`🏠 మొత్తం విస్తీర్ణం: ${totalArea} sq ft

💰 అంచనా ఖర్చు: ₹${total.toLocaleString("en-IN")}

🧱 సిమెంట్ బ్యాగులు: ${cement}

🔩 స్టీల్: ${steel} kg

🏖 ఇసుక: ${sand} m³

🪨 మెటల్: ${agg} m³

⚠ ఇది ప్రాథమిక అంచనా మాత్రమే.
ఫైనల్ ఖర్చు డిజైన్, soil, మార్కెట్ రేట్లపై ఆధారపడుతుంది.

📞 వివరమైన కోట్ కోసం కింద క్లిక్ చేయండి`,
"bot");

}

let msg=encodeURIComponent(
"Hello Dream Ladders, I need detailed estimate.\nCity: "+data.city+
"\nArea: "+data.area+
"\nFloors: "+data.floors+
"\nMaterial: "+data.material+
"\nInterior: "+data.interior+
"\nTotal Area: "+totalArea+" sq ft"
);

addHtml('<a target="_blank" href="https://wa.me/'+phone+'?text='+msg+'">📱 Contact on WhatsApp</a>');

step=0;

}

document.getElementById("sendBtn").addEventListener("click",nextStep);

input.addEventListener("keydown",function(e){
if(e.key==="Enter") nextStep();
});

document.getElementById("btnEn").addEventListener("click",()=>setLang("en"));
document.getElementById("btnTe").addEventListener("click",()=>setLang("te"));
document.getElementById("resetBtn").addEventListener("click",resetChat);

resetChat();

</script>

</body>
</html>
