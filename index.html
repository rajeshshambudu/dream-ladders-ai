<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Dream Ladders AI House Cost Estimator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
padding:15px;
color:#fff;
}

.app{
max-width:700px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:22px;
padding:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

h1{
font-size:28px;
text-align:center;
margin-bottom:8px;
}

.sub{
text-align:center;
opacity:.85;
font-size:14px;
margin-bottom:18px;
}

.lang-box{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

button{
border:none;
border-radius:14px;
padding:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
-webkit-appearance:none;
appearance:none;
touch-action:manipulation;
}

.lang-btn{
background:#fff;
color:#111;
}

.primary{
background:#22c55e;
color:#fff;
}

#chatbox{
background:#fff;
color:#111;
height:420px;
overflow-y:auto;
border-radius:18px;
padding:15px;
margin-bottom:15px;
}

.msg{
padding:12px;
border-radius:14px;
margin-bottom:10px;
line-height:1.45;
white-space:pre-line;
}

.bot{
background:#e0f2fe;
}

.user{
background:#dcfce7;
text-align:right;
}

.input-row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
outline:none;
}

.small{
font-size:12px;
opacity:.8;
text-align:center;
margin-top:10px;
}

@media(max-width:600px){
#chatbox{
height:58vh;
}
h1{
font-size:24px;
}
}
</style>
</head>

<body>

<div class="app">
<div class="card">

<h1>Dream Ladders AI</h1>
<div class="sub">House Cost Estimator</div>

<div class="lang-box">
<button type="button" class="lang-btn" id="btnEn">English</button>
<button type="button" class="lang-btn" id="btnTe">తెలుగు</button>
</div>

<div id="chatbox"></div>

<div class="input-row">
<input type="text" id="userInput" placeholder="Type here">
<button type="button" class="primary" id="sendBtn">Send</button>
</div>

<div class="small">Powered by Dream Ladders</div>

</div>
</div>

<script>
let lang = "en";
let step = 0;
let data = {};

const chatbox = document.getElementById("chatbox");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

const text = {
en:{
placeholder:"Type here",
send:"Send",
questions:[
"Welcome to Dream Ladders AI House Cost Estimator 👷\nGet an instant estimate for your dream home construction.\n\nWhich city are you building in?",
"What is built-up area in sq ft?",
"How many floors?",
"Material type? (standard / premium)",
"Need interior works also? (yes / no)"
]
},
te:{
placeholder:"ఇక్కడ టైప్ చేయండి",
send:"పంపండి",
questions:[
"Dream Ladders AI House Cost Estimator కు స్వాగతం 👷\nమీ కలల ఇంటి నిర్మాణ ఖర్చు అంచనాను వెంటనే తెలుసుకోండి.\n\nమీరు ఏ నగరంలో నిర్మిస్తున్నారు?",
"ఇంటి విస్తీర్ణం ఎంత sq ft?",
"ఎన్ని అంతస్తులు?",
"మెటీరియల్ టైప్? (standard / premium)",
"ఇంటీరియర్ పనులు కూడా కావాలా? (yes / no)"
]
}
};

function addMsg(msg,type){
const div = document.createElement("div");
div.className = "msg " + type;
div.textContent = msg;
chatbox.appendChild(div);
chatbox.scrollTop = chatbox.scrollHeight;
}

function ask(){
addMsg(text[lang].questions[step],"bot");
}

function setLang(selected){
lang = selected;
step = 0;
data = {};
chatbox.innerHTML = "";
input.value = "";
input.placeholder = text[lang].placeholder;
sendBtn.textContent = text[lang].send;
ask();
}

function submitAnswer(){
const val = input.value.trim();
if(!val) return;

addMsg(val,"user");

if(step === 0) data.city = val;
if(step === 1) data.area = parseFloat(val) || 0;
if(step === 2) data.floors = parseInt(val) || 1;
if(step === 3) data.material = val.toLowerCase();
if(step === 4) data.interior = val.toLowerCase();

input.value = "";
step++;

if(step < text[lang].questions.length){
ask();
}else{
showResult();
}
}

function showResult(){

let rate = 1900;

if(data.city && data.city.toLowerCase().includes("hyderabad")) rate = 2200;
if(data.material === "premium") rate += 400;

const totalArea = data.area * data.floors;
let total = totalArea * rate;

if(data.interior === "yes"){
total += totalArea * 350;
}

const cement = Math.round(totalArea * 0.45);
const steel = Math.round(totalArea * 4);
const sand = (totalArea * 0.03).toFixed(1);

let result = "";

if(lang === "en"){
result =
`📍 City: ${data.city}
🏠 Total Area: ${totalArea} sq ft
💰 Estimated Cost: ₹${total.toLocaleString("en-IN")}
🧱 Cement Bags: ${cement}
🔩 Steel: ${steel} kg
🏖 Sand: ${sand} tons

For detailed BOQ contact Dream Ladders.`;
}else{
result =
`📍 నగరం: ${data.city}
🏠 మొత్తం విస్తీర్ణం: ${totalArea} sq ft
💰 అంచనా ఖర్చు: ₹${total.toLocaleString("en-IN")}
🧱 సిమెంట్ బ్యాగులు: ${cement}
🔩 స్టీల్: ${steel} kg
🏖 ఇసుక: ${sand} tons

వివరమైన BOQ కోసం Dream Ladders ను సంప్రదించండి.`;
}

addMsg(result,"bot");

step = 0;
setTimeout(function(){
ask();
},800);
}

document.getElementById("btnEn").addEventListener("click",function(){
setLang("en");
});

document.getElementById("btnTe").addEventListener("click",function(){
setLang("te");
});

sendBtn.addEventListener("click",submitAnswer);

input.addEventListener("keydown",function(e){
if(e.key === "Enter"){
submitAnswer();
}
});

setLang("en");
</script>

</body>
</html>
