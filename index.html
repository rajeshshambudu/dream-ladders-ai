<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dream Ladders AI</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.app{
max-width:700px;
margin:auto;
padding:20px;
}

header{
text-align:center;
margin-bottom:20px;
}

header h1{
margin:0;
font-size:34px;
}

header p{
opacity:0.8;
}

#chatbox{
background:white;
color:#111;
height:500px;
overflow-y:auto;
border-radius:20px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.bot,.user{
padding:12px;
margin:10px 0;
border-radius:12px;
white-space:pre-line;
}

.bot{
background:#e0f2fe;
}

.user{
background:#dcfce7;
text-align:right;
}

.input-area{
display:flex;
gap:10px;
margin-top:15px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
padding:14px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
-webkit-appearance:none;
appearance:none;
}

.lang-box{
margin-top:15px;
display:flex;
gap:10px;
justify-content:center;
}

.lang-box button{
background:white;
color:#111;
}

.send-btn{
background:#22c55e;
color:white;
}

a{
color:#0ea5e9;
font-weight:bold;
text-decoration:none;
}
</style>
</head>
<body>

<div class="app">

<header>
<h1>Dream Ladders AI</h1>
<p>Your Civil Engineer Powered by Smart Logic</p>
</header>

<div id="chatbox"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Type here">
<button type="button" class="send-btn" id="sendBtn">Send</button>
</div>

<div class="lang-box">
<button type="button" id="btnEn">English</button>
<button type="button" id="btnTe">తెలుగు</button>
</div>

</div>

<script>
let lang = "en";
let step = 0;
let data = {};
let phone = "917093218658";

const chatbox = document.getElementById("chatbox");
const input = document.getElementById("userInput");

const q = {
en:[
"Welcome to Dream Ladders AI House Cost Estimator 👷\nGet an instant estimate for your dream home construction.\n\nWhich city are you building in?",
"What is built-up area in sq ft?",
"How many floors?",
"Material type? standard / premium",
"Need interior also? yes / no"
],
te:[
"Dream Ladders AI House Cost Estimator కు స్వాగతం 👷\nమీ కలల ఇంటి నిర్మాణ ఖర్చు అంచనాను వెంటనే తెలుసుకోండి.\n\nమీరు ఏ నగరంలో నిర్మిస్తున్నారు?",
"ఇంటి విస్తీర్ణం ఎంత sq ft?",
"ఎన్ని అంతస్తులు?",
"మెటీరియల్ టైప్? standard / premium",
"ఇంటీరియర్ కూడా కావాలా? yes / no"
]
};

function add(text,type){
let div=document.createElement("div");
div.className=type;
div.innerText=text;
chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;
}

function addHtml(html){
let div=document.createElement("div");
div.className="bot";
div.innerHTML=html;
chatbox.appendChild(div);
chatbox.scrollTop=chatbox.scrollHeight;
}

function ask(){
add(q[lang][step],"bot");
}

function setLang(l){
lang=l;
step=0;
data={};
chatbox.innerHTML="";
input.value="";
ask();
}

function nextStep(){

let val=input.value.trim();

if(!val) return;

add(val,"user");

if(step===0) data.city=val;
if(step===1) data.area=parseFloat(val);
if(step===2) data.floors=parseInt(val);
if(step===3) data.material=val.toLowerCase();
if(step===4) data.interior=val.toLowerCase();

input.value="";
step++;

if(step < q[lang].length){
ask();
}else{
result();
}
}

function result(){

let rate = 1900;

if(data.city.toLowerCase().includes("hyderabad")) rate=2200;
if(data.material==="premium") rate += 400;

let totalArea = data.area * data.floors;
let total = totalArea * rate;

if(data.interior==="yes") total += totalArea * 350;

let cement = Math.round(totalArea * 0.45);
let steel = Math.round(totalArea * 4);

if(lang==="en"){
add(
`🏠 Total Area: ${totalArea} sq ft

💰 Estimated Cost: ₹${total.toLocaleString("en-IN")}

🧱 Cement Bags: ${cement}

🔩 Steel: ${steel} kg

📞 Click below for detailed quote`,
"bot");
}else{
add(
`🏠 మొత్తం విస్తీర్ణం: ${totalArea} sq ft

💰 అంచనా ఖర్చు: ₹${total.toLocaleString("en-IN")}

🧱 సిమెంట్ బ్యాగులు: ${cement}

🔩 స్టీల్: ${steel} kg

📞 వివరమైన కోట్ కోసం కింద క్లిక్ చేయండి`,
"bot");
}

let msg = encodeURIComponent("Hello Dream Ladders, I need detailed estimate for " + totalArea + " sq ft in " + data.city);

addHtml('<a href="https://wa.me/'+phone+'?text='+msg+'" target="_blank">📱 Contact on WhatsApp</a>');
}

document.getElementById("btnEn").addEventListener("click",function(){setLang("en");});
document.getElementById("btnTe").addEventListener("click",function(){setLang("te");});
document.getElementById("sendBtn").addEventListener("click",nextStep);

input.addEventListener("keydown",function(e){
if(e.key==="Enter") nextStep();
});

setLang("en");
</script>

</body>
</html>
